  <rect x="889" y="542" width="106" height="26" rx="13" fill="#F59E0B"/>
  <text x="908" y="560" class="label">AI chain</text>

  <rect x="598" y="838" width="154" height="26" rx="13" fill="#60A5FA"/>
  <text x="620" y="856" class="label">stateful writes</text>

  <rect x="1510" y="468" width="126" height="26" rx="13" fill="#34D399"/>
  <text x="1532" y="486" class="label">webhook</text>

  <rect x="1392" y="908" width="202" height="26" rx="13" fill="#F59E0B"/>
  <text x="1414" y="926" class="label">scheduled dispatch loop</text>
</svg>

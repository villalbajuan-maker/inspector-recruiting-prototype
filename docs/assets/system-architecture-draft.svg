<svg width="1600" height="980" viewBox="0 0 1600 980" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .border { fill: none; stroke: #111111; stroke-width: 2; }
      .lane { fill: none; stroke: #999999; stroke-width: 1; stroke-dasharray: 8 6; }
      .box { fill: #ffffff; stroke: #111111; stroke-width: 2; }
      .store { fill: #f3f3f3; stroke: #111111; stroke-width: 2; }
      .decision { fill: #fafafa; stroke: #111111; stroke-width: 2; }
      .title { font: 700 30px Arial, Helvetica, sans-serif; fill: #111111; }
      .subtitle { font: 400 16px Arial, Helvetica, sans-serif; fill: #333333; }
      .laneTitle { font: 700 18px Arial, Helvetica, sans-serif; fill: #111111; }
      .cardTitle { font: 700 17px Arial, Helvetica, sans-serif; fill: #111111; }
      .body { font: 400 14px Arial, Helvetica, sans-serif; fill: #222222; }
      .small { font: 400 12px Arial, Helvetica, sans-serif; fill: #444444; }
      .flow { font: 700 12px Arial, Helvetica, sans-serif; fill: #111111; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10V0Z" fill="#111111"/>
    </marker>
  </defs>

  <rect class="bg" width="1600" height="980"/>
  <rect class="border" x="28" y="28" width="1544" height="924" rx="8"/>

  <text x="58" y="74" class="title">Inspector Recruiting Prototype - System Architecture</text>
  <text x="58" y="102" class="subtitle">Container-level view of intake, scheduled dispatch, outbound interview execution, evaluation persistence, and WhatsApp-based recruiting operations.</text>

  <!-- Lanes -->
  <rect class="lane" x="50" y="130" width="250" height="790" rx="6"/>
  <rect class="lane" x="330" y="130" width="420" height="790" rx="6"/>
  <rect class="lane" x="780" y="130" width="280" height="790" rx="6"/>
  <rect class="lane" x="1090" y="130" width="460" height="790" rx="6"/>

  <text x="70" y="160" class="laneTitle">Channels</text>
  <text x="350" y="160" class="laneTitle">Core Application</text>
  <text x="800" y="160" class="laneTitle">External Services</text>
  <text x="1110" y="160" class="laneTitle">Persistent State</text>

  <!-- Channels -->
  <rect class="box" x="75" y="220" width="200" height="120" rx="8"/>
  <text x="95" y="252" class="cardTitle">Candidate Journey</text>
  <text x="95" y="278" class="body">Public landing page</text>
  <text x="95" y="300" class="body">Collects identity and</text>
  <text x="95" y="322" class="body">call_now / schedule_call intent</text>

  <rect class="box" x="75" y="640" width="200" height="120" rx="8"/>
  <text x="95" y="672" class="cardTitle">Hiring Lead</text>
  <text x="95" y="698" class="body">Operates through WhatsApp</text>
  <text x="95" y="720" class="body">Requests lists, reports,</text>
  <text x="95" y="742" class="body">comparisons, and follow-ups</text>

  <!-- Core -->
  <rect class="box" x="365" y="205" width="350" height="120" rx="8"/>
  <text x="385" y="237" class="cardTitle">Candidate Intake Service</text>
  <text x="385" y="263" class="body">`intake-inspection`</text>
  <text x="385" y="285" class="body">Validates payload, normalizes candidate</text>
  <text x="385" y="307" class="body">identity, creates draft interview session</text>

  <rect class="box" x="365" y="365" width="350" height="135" rx="8"/>
  <text x="385" y="397" class="cardTitle">Call Dispatch Service</text>
  <text x="385" y="423" class="body">`start-interview-call` + `dispatch-scheduled-interviews`</text>
  <text x="385" y="445" class="body">Promotes immediate or due scheduled</text>
  <text x="385" y="467" class="body">sessions into outbound interview calls</text>

  <rect class="box" x="365" y="540" width="350" height="155" rx="8"/>
  <text x="385" y="572" class="cardTitle">Interview Processing Pipeline</text>
  <text x="385" y="598" class="body">`retell-webhook` -> `extract-interview-data`</text>
  <text x="385" y="620" class="body">-> `build-inspection-intelligence`</text>
  <text x="385" y="642" class="body">-> `write-intelligence`</text>
  <text x="385" y="664" class="body">Persists transcript, evaluation, and pipeline updates</text>

  <rect class="box" x="365" y="735" width="350" height="120" rx="8"/>
  <text x="385" y="767" class="cardTitle">WhatsApp Operations Service</text>
  <text x="385" y="793" class="body">`whatsapp-operator` + `hiring-operator-orchestrator`</text>
  <text x="385" y="815" class="body">Deterministic lists, selection, ranking,</text>
  <text x="385" y="837" class="body">and grounded interview Q&amp;A</text>

  <!-- External -->
  <rect class="box" x="815" y="365" width="210" height="120" rx="8"/>
  <text x="835" y="397" class="cardTitle">Retell</text>
  <text x="835" y="423" class="body">Places outbound interview calls</text>
  <text x="835" y="445" class="body">Emits call completion webhook</text>

  <rect class="box" x="815" y="735" width="210" height="120" rx="8"/>
  <text x="835" y="767" class="cardTitle">Infobip</text>
  <text x="835" y="793" class="body">WhatsApp transport only</text>
  <text x="835" y="815" class="body">Inbound text, buttons, audio</text>
  <text x="835" y="837" class="body">Outbound rendered replies</text>

  <rect class="box" x="815" y="545" width="210" height="120" rx="8"/>
  <text x="835" y="577" class="cardTitle">OpenAI</text>
  <text x="835" y="603" class="body">Voice transcription</text>
  <text x="835" y="625" class="body">Grounded summary, risks, compare, Q&amp;A</text>

  <!-- State -->
  <rect class="store" x="1125" y="205" width="390" height="120" rx="8"/>
  <text x="1145" y="237" class="cardTitle">Recruiting Core</text>
  <text x="1145" y="263" class="body">`candidate`</text>
  <text x="1145" y="285" class="body">`interview_session`</text>
  <text x="1145" y="307" class="body">System of record for intake, scheduling, call status, transcript</text>

  <rect class="store" x="1125" y="415" width="390" height="100" rx="8"/>
  <text x="1145" y="447" class="cardTitle">Evaluation Store</text>
  <text x="1145" y="473" class="body">`candidate_intelligence`</text>
  <text x="1145" y="495" class="body">Structured fit assessment and decision signals</text>

  <rect class="store" x="1125" y="625" width="390" height="120" rx="8"/>
  <text x="1145" y="657" class="cardTitle">Operator State and Audit</text>
  <text x="1145" y="683" class="body">`hiring_operator_conversation_state`</text>
  <text x="1145" y="705" class="body">`hiring_operator_inbound_events`</text>
  <text x="1145" y="727" class="body">`hiring_operator_outbound_events`</text>

  <rect class="decision" x="1125" y="795" width="390" height="95" rx="8"/>
  <text x="1145" y="827" class="cardTitle">Architectural Decision</text>
  <text x="1145" y="853" class="body">Determinism owns navigation, lists, selection, and empty states.</text>
  <text x="1145" y="875" class="body">LLM is used only for transcription and grounded response generation.</text>

  <!-- Flow labels -->
  <text x="365" y="188" class="flow">Flow A - Intake and scheduling</text>
  <text x="365" y="348" class="flow">Flow B - Call execution</text>
  <text x="365" y="523" class="flow">Flow C - Evaluation persistence</text>
  <text x="365" y="718" class="flow">Flow D - Operational visibility via WhatsApp</text>

  <!-- Arrows -->
  <line x1="275" y1="280" x2="365" y2="265" stroke="#111111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="715" y1="255" x2="1125" y2="255" stroke="#111111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="325" x2="540" y2="365" stroke="#111111" stroke-width="2.5" marker-end="url(#arrow)"/>

  <line x1="715" y1="430" x2="815" y2="425" stroke="#111111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="540" y1="500" x2="540" y2="540" stroke="#111111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="920" y1="485" x2="920" y2="540" stroke="#111111" stroke-width="2.5" stroke-dasharray="10 6" marker-end="url(#arrow)"/>

  <line x1="715" y1="610" x2="815" y2="605" stroke="#111111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="715" y1="640" x2="1125" y2="465" stroke="#111111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="715" y1="585" x2="1125" y2="285" stroke="#111111" stroke-width="2.5" marker-end="url(#arrow)"/>

  <line x1="275" y1="700" x2="815" y2="795" stroke="#111111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="815" y1="795" x2="715" y2="795" stroke="#111111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="715" y1="775" x2="1125" y2="675" stroke="#111111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="715" y1="805" x2="1125" y2="255" stroke="#111111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="715" y1="825" x2="1125" y2="465" stroke="#111111" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="715" y1="755" x2="815" y2="605" stroke="#111111" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Scheduler note -->
  <rect class="box" x="480" y="885" width="520" height="35" rx="6"/>
  <text x="495" y="908" class="small">Scheduler: `pg_cron + pg_net` invokes `dispatch-scheduled-interviews` every minute to scan due `schedule_call` sessions.</text>
</svg>
